name: AI Documentation Updater

on:
  push:
    branches: [main]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build diff (source files only)
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Handle first-ever push (no previous commit)
          if git cat-file -e "$BEFORE" 2>/dev/null; then
            git diff "$BEFORE" "$AFTER" -- '*.py' '*.js' '*.ts' > changes.diff
          else
            git show "$AFTER" -- '*.py' '*.js' '*.ts' > changes.diff
          fi

          LINES=$(wc -l < changes.diff)
          echo "Diff: $LINES lines"

      - name: Run AI doc updater
        run: python3 .github/scripts/update_docs.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated docs (if anything changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No doc changes to commit."
          else
            git commit -m "docs: auto-update from AI [skip ci]"
            git push
          fi

      - name: Sync docs to GitHub Wiki
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            wiki
          cp docs/*.md wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "docs: sync from main [skip ci]"
            git push
          fi
