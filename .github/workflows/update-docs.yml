name: AI Documentation Updater

on:
  push:
    branches: [main]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build diffs
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if git cat-file -e "$BEFORE" 2>/dev/null; then
            # Normal push — diff against previous commit
            git diff "$BEFORE" "$AFTER" -- '*.py' '*.js' '*.ts' > changes.diff
            git diff "$BEFORE" "$AFTER" -- 'docs/*.md' > docs_manual_changes.diff
          else
            # First-ever push to this repo
            git show "$AFTER" -- '*.py' '*.js' '*.ts' > changes.diff
            git show "$AFTER" -- 'docs/*.md' > docs_manual_changes.diff
          fi

          echo "Code diff:       $(wc -l < changes.diff) lines"
          echo "Manual doc diff: $(wc -l < docs_manual_changes.diff) lines"
          echo "Triggered by:    ${{ github.actor }}"
          echo "--- code diff preview (first 20 lines) ---"
          head -20 changes.diff || true

      - name: Run AI doc updater
        run: python3 .github/scripts/update_docs.py
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Commit updated docs (if anything changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No doc changes to commit."
          else
            git commit -m "docs: auto-update from AI [skip ci]"
            # Another push may have landed while this workflow was running — rebase before pushing
            git pull --rebase origin main
            git push
          fi

      - name: Sync docs to GitHub Wiki
        run: |
          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"

          if ! git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "::warning::Wiki not initialised — skipping sync."
            echo "To enable: go to the Wiki tab and create the first page."
            exit 0
          fi

          # Detect human wiki edits (last commit not from the bot)
          LAST_WIKI_AUTHOR=$(cd wiki && git log -1 --format='%an')
          LAST_WIKI_SUBJECT=$(cd wiki && git log -1 --format='%s')
          if [ "$LAST_WIKI_AUTHOR" != "github-actions[bot]" ]; then
            echo "::warning::Wiki was manually edited by '$LAST_WIKI_AUTHOR' (\"$LAST_WIKI_SUBJECT\")."
            echo "::warning::Wiki is a read-only mirror — edit docs/*.md in the repo instead."
            echo "::warning::The manual wiki edit will be overwritten by this sync."
          fi

          cp docs/*.md wiki/

          # Write custom sidebar — defines page order in wiki navigation
          printf '## Documentation\n\n- [Home](Home)\n- [Overview](overview)\n- [API Reference](api-reference)\n- [Changelog](changelog)\n' > wiki/_Sidebar.md

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "docs: sync from @${{ github.actor }} [skip ci]"
            # Wiki is a read-only mirror — force-with-lease overwrites any UI edits
            # but only if nobody pushed to the wiki AFTER we cloned (avoids silent clobber)
            if ! git push --force-with-lease; then
              echo "::warning::Wiki was updated after this workflow cloned it."
              echo "::warning::Re-trigger the workflow (empty commit or re-push) to sync again."
            fi
          fi
