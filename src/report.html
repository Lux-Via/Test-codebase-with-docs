<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Report</title>
  <style>
    body        { font-family: sans-serif; padding: 2rem; background: #f9f9f9; }
    h1          { color: #333; }
    table       { width: 100%; border-collapse: collapse; background: #fff; }
    th, td      { padding: 0.75rem 1rem; border: 1px solid #ddd; text-align: left; }
    th          { background: #4a4a8a; color: #fff; }
    tr:nth-child(even) { background: #f2f2f2; }
    .low-stock  { color: #c0392b; font-weight: bold; }
    .ok         { color: #27ae60; }
    .summary    { margin-top: 1.5rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <h1>Inventory Report</h1>

  <table id="inventory-table">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rows injected by Inventory.generate_report() -->
    </tbody>
  </table>

  <div class="summary">
    <span id="total-products"></span> products &nbsp;|&nbsp;
    Total value: <strong id="total-value"></strong>
  </div>
</body>
</html>
